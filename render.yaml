
services:
  - type: web
    name: ip-geo-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracker-db
          property: connectionString

databases:
  - name: tracker-db
    plan: free